<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Google STT 자동 종료 테스트</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin-right: 10px; font-size: 16px; cursor: pointer; }
        textarea { width: 100%; max-width: 500px; margin-top: 20px; padding: 10px; font-size: 16px; }
        #status { color: blue; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Google STT 자동 침묵 감지 테스트</h2>
    <button id="startBtn">🔴 녹음 시작</button>
    <button id="stopBtn" disabled>⏹️ 수동 중지</button>
    <p>상태: <span id="status">대기 중</span></p>
    
    <textarea id="result" rows="5" placeholder="말이 끝나면 자동으로 결과가 나옵니다..." readonly></textarea>

    <script>
        const API_KEY = ''; 
        if(API_KEY === '') {
            alert("API_KEY를 입력해주세요.");
        }
        
        let mediaRecorder;
        let audioChunks = [];
        let audioContext;
        let analyser;
        let microphone;
        let javascriptNode;

        // --- 설정 값 (테스트 환경에 맞춰 조절 필요) ---
        const SILENCE_THRESHOLD = 10; // 침묵으로 간주할 볼륨 임계값 (0~255)
        const SILENCE_DURATION = 1500; // 침묵이 몇 ms 동안 유지되면 종료할지 (1.5초)

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resultArea = document.getElementById('result');
        const statusText = document.getElementById('status');

        startBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // 1. Web Audio API 설정 (볼륨 모니터링용)
                audioContext = new AudioContext();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                analyser.smoothingTimeConstant = 0.8;
                analyser.fftSize = 1024;

                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                let silenceStart = performance.now();

                // 실시간 오디오 처리 루프
                javascriptNode.onaudioprocess = () => {
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    
                    // 평균 볼륨 계산
                    let values = 0;
                    for (let i = 0; i < array.length; i++) {
                        values += array[i];
                    }
                    const average = values / array.length;

                    // 볼륨 확인 로그 (테스트 시 확인용)
                    // console.log("현재 볼륨:", average);

                    if (average > SILENCE_THRESHOLD) {
                        // 소리가 감지되면 시작 시간 갱신
                        silenceStart = performance.now();
                        statusText.innerText = "음성 감지 중...";
                    } else {
                        statusText.innerText = "침묵 중...";
                        // 설정한 시간만큼 침묵이 유지되면 녹음 중지
                        if (performance.now() - silenceStart > SILENCE_DURATION) {
                            console.log("침묵 감지됨 - 자동 종료");
                            stopRecording();
                        }
                    }
                };

                // 2. MediaRecorder 설정 (실제 녹음용)
                const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
                mediaRecorder = new MediaRecorder(stream, { mimeType });

                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = async () => {
                    statusText.innerText = "인식 요청 중...";
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    audioChunks = [];

                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        const base64Audio = reader.result.split(',')[1];
                        sendToGoogleSTT(base64Audio);
                    };
                    
                    // Audio Context 리소스 해제
                    stopAudioContext();
                };

                mediaRecorder.start();
                startBtn.disabled = true;
                stopBtn.disabled = false;
                resultArea.value = "";

            } catch (err) {
                console.error(err);
                alert("마이크 접근 실패");
            }
        };

        stopBtn.onclick = () => stopRecording();

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        function stopAudioContext() {
            if (audioContext) {
                javascriptNode.disconnect();
                analyser.disconnect();
                microphone.disconnect();
                audioContext.close();
            }
        }

        async function sendToGoogleSTT(base64Audio) {
            const url = `https://speech.googleapis.com/v1/speech:recognize?key=${API_KEY}`;
            const requestBody = {
                config: {
                    encoding: 'WEBM_OPUS',
                    sampleRateHertz: 48000,
                    languageCode: 'ko-KR',
                },
                audio: { content: base64Audio }
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });
                const data = await response.json();
                if (data.results) {
                    resultArea.value = data.results[0].alternatives[0].transcript;
                    statusText.innerText = "완료";
                } else {
                    resultArea.value = "인식 실패";
                    statusText.innerText = "대기 중";
                }
            } catch (error) {
                console.error(error);
                statusText.innerText = "에러 발생";
            }
        }
    </script>
</body>
</html>
